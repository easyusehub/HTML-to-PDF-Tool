<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML to PDF </title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#9333ea; color:#fff; text-align:center; padding:15px; }

.container { max-width:900px; margin:auto; padding:15px; }

textarea {
  width:100%;
  height:150px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:10px;
  font-family:monospace;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  margin:5px 0;
}

#preview {
  background:#fff;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  min-height:200px;
  margin-bottom:15px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#9333ea;
  color:#fff;
  cursor:pointer;
  margin:5px;
}

.ad {
  height:60px;
  background:#ccc;
  text-align:center;
  line-height:60px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>HTML to PDF </h1>
<p>Convert HTML, URL, or File into PDF</p>
</header>

<div class="ad">Top Ad</div>

<div class="container">

<!-- HTML INPUT -->
<textarea id="htmlInput" placeholder="<h1>Hello World</h1>"></textarea>

<!-- URL INPUT -->
<input type="text" id="urlInput" placeholder="Enter Website URL (https://...)">

<!-- FILE INPUT -->
<input type="file" id="fileInput" accept=".html">

<!-- SETTINGS -->
<div>
<select id="pageSize">
<option value="a4">A4</option>
<option value="letter">Letter</option>
</select>

<input type="number" id="margin" value="10" placeholder="Margin (mm)">
</div>

<div id="preview"></div>

<div class="ad">Middle Ad</div>

<button onclick="generateFromHTML()">📄 HTML → PDF</button>
<button onclick="generateFromURL()">🌐 URL → PDF</button>

<button onclick="window.location.href='https://easyusehub.blogspot.com/?m=1'">🏠 Home</button>
<button onclick="window.location.href='https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1'">📚 All Tools</button>

</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const { jsPDF } = window.jspdf;
const preview = document.getElementById("preview");

// Live preview (HTML input)
document.getElementById("htmlInput").addEventListener("input", e => {
  preview.innerHTML = e.target.value;
});

// Load HTML file
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(ev){
      preview.innerHTML = ev.target.result;
    }
    reader.readAsText(file);
  }
});

// HTML → PDF
async function generateFromHTML(){
  if(!preview.innerHTML) return alert("No content!");

  createPDF(preview);
}

// URL → PDF (basic)
async function generateFromURL(){
  const url = document.getElementById("urlInput").value;
  if(!url) return alert("Enter URL!");

  preview.innerHTML = `<iframe src="${url}" width="100%" height="600px"></iframe>`;
  setTimeout(()=> createPDF(preview), 2000);
}

// Core PDF function
async function createPDF(element){
  const pageSize = document.getElementById("pageSize").value;
  const margin = parseInt(document.getElementById("margin").value) || 10;

  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: pageSize
  });

  const canvas = await html2canvas(element, { scale: 2 });
  const imgData = canvas.toDataURL("image/jpeg", 1.0);

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const imgWidth = pageWidth - margin * 2;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let heightLeft = imgHeight;
  let position = margin;

  pdf.addImage(imgData, 'JPEG', margin, position, imgWidth, imgHeight);
  heightLeft -= (pageHeight - margin * 2);

  while (heightLeft > 0) {
    pdf.addPage();
    position = margin - imgHeight + heightLeft;
    pdf.addImage(imgData, 'JPEG', margin, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - margin * 2);
  }

  pdf.save("ultimate-pdf.pdf");
}
</script>

</body>
</html>
